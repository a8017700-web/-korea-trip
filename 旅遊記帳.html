<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅遊記帳小幫手</title>
    
    <!-- 引入 Tailwind CSS 進行排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 核心套件 (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 編譯器，讓瀏覽器能看得懂 JSX 語法 -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        /* 隱藏滾動條但保留滾動功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { margin: 0; background-color: #f1f5f9; overscroll-behavior-y: none; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 內建 SVG 圖示元件 (取代原本需要安裝的 lucide-react，確保離線可用) ---
        const IconList = ({size=22, className=""}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>);
        const IconPieChart = ({size=22, className=""}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>);
        const IconTrash = ({size=18, className=""}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>);
        const IconCheck = ({size=24, className=""}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>);
        const IconArrowRight = ({size=20, className=""}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>);
        const IconArrowLeft = ({size=20, className=""}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>);
        const IconAlert = ({size=48, className=""}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>);

        // --- 設定常數資料 ---
        const CATEGORIES = [
          { id: 'food', name: '餐飲', icon: '🍜' },
          { id: 'transport', name: '交通', icon: '🚇' },
          { id: 'shopping', name: '購物', icon: '🛍️' },
          { id: 'ticket', name: '景點', icon: '🎟️' },
          { id: 'hotel', name: '住宿', icon: '🛏️' },
          { id: 'other', name: '其他', icon: '🛒' },
        ];

        const PAYMENT_METHODS = [
          { id: 'cash', name: '現金', icon: '💵' },
          { id: 'card', name: '信用卡', icon: '💳' },
          { id: 'tmoney', name: 'T-money', icon: '🚆' },
          { id: 'epay', name: '電子支付', icon: '📱' },
        ];

        const DAYS = ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5'];
        const EXCHANGE_RATE = 0.024; /* 1 韓元 = 0.024 台幣 */
        const STORAGE_KEY = 'offline_travel_records';

        function App() {
          const [activeTab, setActiveTab] = useState('add');
          const [selectedDay, setSelectedDay] = useState('Day 1');
          const [amount, setAmount] = useState('0');
          const [itemName, setItemName] = useState('');
          const [records, setRecords] = useState([]);
          const [toast, setToast] = useState({ show: false, message: '', isError: false });

          const [inputStep, setInputStep] = useState(1);
          const [selectedCategory, setSelectedCategory] = useState(CATEGORIES[0]);
          const [selectedPayment, setSelectedPayment] = useState(PAYMENT_METHODS[0]);
          const [showClearConfirm, setShowClearConfirm] = useState(false);

          // 啟動時讀取 Local Storage (本機離線儲存)
          useEffect(() => {
            try {
              const savedRecords = localStorage.getItem(STORAGE_KEY);
              if (savedRecords) {
                setRecords(JSON.parse(savedRecords));
              }
            } catch (e) {
              console.error('讀取紀錄失敗', e);
            }
          }, []);

          // 資料變動時，自動寫入 Local Storage
          useEffect(() => {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
          }, [records]);

          const handleNumClick = (num) => {
            if (amount === '0') {
              setAmount(num);
            } else {
              if (amount.length < 9) setAmount(prev => prev + num);
            }
          };

          const handleDelete = () => setAmount(prev => prev.length > 1 ? prev.slice(0, -1) : '0');

          const handleClear = () => {
            setAmount('0');
            setItemName('');
            setInputStep(1);
            setSelectedCategory(CATEGORIES[0]);
            setSelectedPayment(PAYMENT_METHODS[0]);
          };

          const showToastMsg = (message, isError = false) => {
            setToast({ show: true, message, isError });
            setTimeout(() => setToast({ show: false, message: '', isError: false }), 2000);
          };

          const handleNextStep = () => {
            if (amount === '0' || amount === '') {
              showToastMsg('請先輸入金額！', true);
              return;
            }
            setInputStep(2);
          };

          const handleSave = () => {
            const newRecord = {
              id: Date.now(),
              day: selectedDay,
              item: itemName.trim() !== '' ? itemName : selectedCategory.name,
              category: selectedCategory.name,
              icon: selectedCategory.icon,
              payment: selectedPayment.name,
              paymentIcon: selectedPayment.icon,
              amountLocal: parseInt(amount, 10),
              amountTWD: Math.round(parseInt(amount, 10) * EXCHANGE_RATE)
            };

            setRecords([...records, newRecord]);
            showToastMsg(`已儲存：${newRecord.item}`);
            handleClear();
          };

          const deleteRecord = (id) => setRecords(records.filter(record => record.id !== id));

          const handleClearAll = () => {
            setRecords([]);
            setShowClearConfirm(false);
            showToastMsg('所有紀錄已清空');
          };

          // 計算金額
          const totalTWD = records.reduce((sum, record) => sum + record.amountTWD, 0);
          const currentDayRecords = records.filter(record => record.day === selectedDay);
          const currentDayTotalLocal = currentDayRecords.reduce((sum, record) => sum + record.amountLocal, 0);

          return (
            <div className="max-w-md mx-auto h-[100dvh] bg-slate-100 flex flex-col font-sans overflow-hidden shadow-2xl relative">
              
              {/* 清除所有紀錄確認視窗 */}
              {showClearConfirm && (
                <div className="absolute inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                  <div className="bg-white rounded-2xl p-6 w-full max-w-xs shadow-2xl transform transition-all">
                    <div className="flex justify-center mb-4 text-red-500">
                      <IconAlert size={48} />
                    </div>
                    <h3 className="text-xl font-black mb-2 text-slate-800 text-center">確定清空所有紀錄？</h3>
                    <p className="text-slate-500 text-center text-sm mb-6 font-medium">
                      這個操作會永久刪除手機裡的所有記帳資料，<span className="text-red-500 font-bold">且無法復原。</span>
                    </p>
                    <div className="flex gap-3">
                      <button onClick={() => setShowClearConfirm(false)} className="flex-1 py-3 bg-slate-100 hover:bg-slate-200 rounded-xl font-bold text-slate-600 transition-colors">取消</button>
                      <button onClick={handleClearAll} className="flex-1 py-3 bg-red-500 hover:bg-red-600 rounded-xl font-bold text-white transition-colors">確定刪除</button>
                    </div>
                  </div>
                </div>
              )}

              {/* Toast 訊息 */}
              {toast.show && (
                <div className={`absolute top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-full shadow-lg flex items-center gap-2 text-white font-medium transition-opacity duration-300 ${toast.isError ? 'bg-red-500' : 'bg-green-600'}`}>
                  {!toast.isError && <IconCheck size={18} />}
                  {toast.message}
                </div>
              )}

              {/* 頂部導覽列 */}
              <div className="flex bg-white shadow-sm border-b shrink-0">
                <button onClick={() => setActiveTab('add')} className={`flex-1 py-4 flex items-center justify-center gap-2 font-bold text-lg transition-colors ${activeTab === 'add' ? 'text-blue-600 border-b-4 border-blue-600' : 'text-slate-400'}`}>
                  <IconList size={22} />快速記帳
                </button>
                <button onClick={() => setActiveTab('summary')} className={`flex-1 py-4 flex items-center justify-center gap-2 font-bold text-lg transition-colors ${activeTab === 'summary' ? 'text-blue-600 border-b-4 border-blue-600' : 'text-slate-400'}`}>
                  <IconPieChart size={22} />總表與明細
                </button>
              </div>

              <div className="flex-1 overflow-y-auto flex flex-col relative">
                {/* 天數選擇器 */}
                <div className="bg-white px-4 py-3 border-b flex gap-3 overflow-x-auto shrink-0 no-scrollbar">
                  {DAYS.map(day => (
                    <button key={day} onClick={() => setSelectedDay(day)} className={`px-5 py-2 rounded-full font-bold whitespace-nowrap transition-colors ${selectedDay === day ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                      {day}
                    </button>
                  ))}
                </div>

                {}
                {activeTab === 'add' && (
                  <div className="flex-1 flex flex-col p-4 gap-4 h-full">
                    {/* 金額顯示面板 */}
                    <div className="bg-white rounded-2xl p-4 shadow-sm shrink-0">
                      <div className="text-right">
                        <div className="text-sm font-semibold text-slate-400 mb-1">韓元 (KRW)</div>
                        <div className="text-5xl font-black tracking-tight text-slate-800 mb-2 truncate">{parseInt(amount).toLocaleString()}</div>
                        <div className="text-md text-blue-600 font-bold mb-4">≈ NT$ {Math.round(parseInt(amount) * EXCHANGE_RATE).toLocaleString()}</div>
                      </div>
                      <div className="border-t pt-3">
                        {inputStep === 1 ? (
                          <input type="text" value={itemName} onChange={(e) => setItemName(e.target.value)} placeholder="輸入備註或品項 (選填)..." className="w-full bg-slate-50 border-none rounded-xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                        ) : (
                          <div className="w-full bg-slate-50 rounded-xl px-4 py-3 text-lg text-slate-600 font-medium">{itemName.trim() !== '' ? itemName : '未填寫品項 (自動套用分類)'}</div>
                        )}
                      </div>
                    </div>

                    {/* 第一層：數字鍵盤 */}
                    {inputStep === 1 && (
                      <div className="flex-1 flex flex-col">
                        <div className="grid grid-cols-3 gap-2 flex-1 mt-2">
                          {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                            <button key={num} onClick={() => handleNumClick(num.toString())} className="bg-white rounded-xl shadow-sm text-3xl font-bold text-slate-800 flex items-center justify-center active:bg-slate-200 active:scale-95 transition-all">{num}</button>
                          ))}
                          <button onClick={handleClear} className="bg-slate-200 rounded-xl shadow-sm text-xl font-bold text-red-500 flex items-center justify-center active:bg-slate-300 active:scale-95 transition-all">清除</button>
                          <button onClick={() => handleNumClick('0')} className="bg-white rounded-xl shadow-sm text-3xl font-bold text-slate-800 flex items-center justify-center active:bg-slate-200 active:scale-95 transition-all">0</button>
                          <button onClick={handleDelete} className="bg-slate-200 rounded-xl shadow-sm text-xl font-bold text-slate-700 flex items-center justify-center active:bg-slate-300 active:scale-95 transition-all">⌫</button>
                        </div>
                        <button onClick={handleNextStep} className="w-full bg-blue-600 text-white font-bold text-xl py-4 rounded-xl shadow-md active:bg-blue-700 active:scale-95 transition-all shrink-0 mt-3 flex items-center justify-center gap-2">
                          下一步 <IconArrowRight size={20} />
                        </button>
                      </div>
                    )}

                    {/* 第二層：分類與支付方式 */}
                    {inputStep === 2 && (
                      <div className="flex-1 flex flex-col gap-4 overflow-y-auto no-scrollbar pb-2">
                        <div className="shrink-0">
                          <div className="text-sm font-bold text-slate-500 mb-2 px-1">選擇分類</div>
                          <div className="grid grid-cols-3 gap-2">
                            {CATEGORIES.map(cat => (
                              <button key={cat.id} onClick={() => setSelectedCategory(cat)} className={`border rounded-xl py-3 flex flex-col items-center justify-center gap-1 shadow-sm transition-all ${selectedCategory.id === cat.id ? 'bg-blue-100 border-blue-400 ring-2 ring-blue-400 ring-opacity-50' : 'bg-white hover:bg-slate-50'}`}>
                                <span className="text-2xl">{cat.icon}</span><span className={`text-sm font-bold ${selectedCategory.id === cat.id ? 'text-blue-700' : 'text-slate-700'}`}>{cat.name}</span>
                              </button>
                            ))}
                          </div>
                        </div>

                        <div className="shrink-0">
                          <div className="text-sm font-bold text-slate-500 mb-2 px-1">支付方式</div>
                          <div className="grid grid-cols-2 gap-2">
                            {PAYMENT_METHODS.map(pay => (
                              <button key={pay.id} onClick={() => setSelectedPayment(pay)} className={`border rounded-xl py-3 flex items-center justify-center gap-2 shadow-sm transition-all ${selectedPayment.id === pay.id ? 'bg-indigo-100 border-indigo-400 ring-2 ring-indigo-400 ring-opacity-50' : 'bg-white hover:bg-slate-50'}`}>
                                <span className="text-xl">{pay.icon}</span><span className={`text-sm font-bold ${selectedPayment.id === pay.id ? 'text-indigo-700' : 'text-slate-700'}`}>{pay.name}</span>
                              </button>
                            ))}
                          </div>
                        </div>

                        <div className="flex-1"></div>

                        <div className="flex gap-3 shrink-0 mt-2">
                          <button onClick={() => setInputStep(1)} className="flex-1 bg-slate-200 text-slate-700 font-bold text-lg py-4 rounded-xl shadow-sm active:bg-slate-300 active:scale-95 transition-all flex items-center justify-center gap-1">
                            <IconArrowLeft size={20} />返回
                          </button>
                          <button onClick={handleSave} className="flex-[2] bg-green-600 text-white font-bold text-xl py-4 rounded-xl shadow-md active:bg-green-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                            <IconCheck size={24} />確認送出
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {}
                {activeTab === 'summary' && (
                  <div className="flex-1 flex flex-col p-4 gap-4 overflow-y-auto relative">
                    <div className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-6 text-white shadow-md shrink-0">
                      <div className="text-blue-100 font-medium mb-1">這趟旅程總花費 (TWD)</div>
                      <div className="text-4xl font-black mb-4">NT$ {totalTWD.toLocaleString()}</div>
                      <div className="flex justify-between items-end border-t border-blue-500/50 pt-4">
                        <div>
                          <div className="text-blue-100 text-sm">{selectedDay} 總計 (KRW)</div>
                          <div className="text-2xl font-bold">₩ {currentDayTotalLocal.toLocaleString()}</div>
                        </div>
                      </div>
                    </div>

                    <div className="flex-1 bg-white rounded-2xl shadow-sm p-4 flex flex-col">
                      <h3 className="font-bold text-slate-800 mb-4 border-b pb-2 flex justify-between items-center shrink-0">
                        <span>{selectedDay} 明細</span>
                        <span className="bg-slate-100 text-slate-500 px-2 py-1 rounded-md text-sm font-normal">{currentDayRecords.length} 筆紀錄</span>
                      </h3>
                      
                      <div className="flex-1 overflow-y-auto no-scrollbar">
                        {currentDayRecords.length === 0 ? (
                          <div className="text-center text-slate-400 py-10">
                            <IconPieChart size={48} className="mx-auto mb-3 opacity-20" />
                            <p>這天還沒有記帳紀錄喔！</p>
                          </div>
                        ) : (
                          <div className="flex flex-col gap-3">
                            {currentDayRecords.slice().reverse().map(record => (
                              <div key={record.id} className="flex items-center gap-3 p-3 bg-slate-50 rounded-xl border border-slate-100">
                                <div className="text-3xl bg-white p-2 rounded-lg shadow-sm">{record.icon}</div>
                                <div className="flex-1 min-w-0">
                                  <div className="font-bold text-slate-800 truncate">{record.item}</div>
                                  <div className="text-xs text-slate-400 flex items-center gap-1 mt-0.5">
                                    <span>{record.category}</span><span className="text-slate-300">•</span>
                                    <span className="bg-slate-200 px-1.5 py-0.5 rounded text-slate-600 flex items-center gap-1">
                                      <span>{record.paymentIcon}</span><span>{record.payment}</span>
                                    </span>
                                  </div>
                                </div>
                                <div className="text-right">
                                  <div className="font-bold text-slate-800">₩{record.amountLocal.toLocaleString()}</div>
                                  <div className="text-xs text-slate-400">NT$ {record.amountTWD.toLocaleString()}</div>
                                </div>
                                <button onClick={() => deleteRecord(record.id)} className="ml-2 p-2 text-red-400 hover:bg-red-50 hover:text-red-600 rounded-lg transition-colors">
                                  <IconTrash size={18} />
                                </button>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                      
                      {records.length > 0 && (
                        <div className="shrink-0 mt-4 pt-4 border-t border-slate-100 flex justify-center">
                          <button onClick={() => setShowClearConfirm(true)} className="flex items-center gap-2 text-slate-400 hover:text-red-500 font-bold px-4 py-2 rounded-xl transition-colors">
                            <IconTrash size={16} /> 清空所有天數紀錄
                          </button>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
